<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>AlphaDesk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    
    <h1>AlphaDesk</h1>

    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button class="btn-primary" onclick="login()">Login</button>
    <button class="btn-success" onclick="registrar()">Registrar</button>

    <hr>

    <input id="titulo" placeholder="Título do chamado">
    <input id="descricao" placeholder="Descrição">

    <button class="btn-primary" onclick="criarChamado()">Criar Chamado</button>

    <ul id="lista"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
