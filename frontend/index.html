<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaDesk</title>
</head>
<body>
<h1>Chamados</h1>

<input id="titulo" placeholder="Título">
<input id="descricao" placeholder="Descrição">
<button onclick="criarChamado()">Criar</button>
<button onclick="login()">Login</button>
<button onclick="registrar()">Registrar</button>
<ul id="lista"></ul>

<script>
    let token = "";

    async function login() {
        const res = await fetch ("http://localhost:3000/login", {
            method: "post",
            headers:{"content-type": "application/json"},
            body: JSON.stringify({
                email: "teste@teste.com",
                senha: "123456"
            })
        });

        const data = await res.json();
        token = data.token;

        console.log("token:", token)

        carregarChamados();
    }

    async function registrar() {
        const res = await fetch("http://localhost:3000/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                email: "teste@teste.com",
                senha: "123456"
            })
        });

        const text = await res.text();
        console.log("Resposta register:", text);
    }

    async function carregarChamados() {
        const res = await fetch("http://localhost:3000/chamados",{
            headers: {
                "Content-Type": "application/json",
                "Authorization": token
            }
        });
        let chamados;

        try {
            chamados = await res.json();
        } catch {
            const text = await res.text();
            console.error("Erro:", text);
            return;
        }

        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        chamados.forEach(c => {
            const item = document.createElement("li");
            item.innerHTML = `
                ${c.titulo} - ${c.status}
                <button onclick="atualizar(${c.id}, 'em andamento')">Em andamento</button>
                <button onclick="atualizar(${c.id}, 'resolvido')">Resolver</button>
            `;
            lista.appendChild(item);
        });  
    }

    async function criarChamado() {
        const titulo = document.getElementById("titulo").value;
        const descricao = document.getElementById("descricao").value;

        await fetch("http://localhost:3000/chamados", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": token
            },
            body: JSON.stringify({titulo, descricao})
        });
        
        carregarChamados();
    }

    async function atualizar(id, status) {
        await fetch(`http://localhost:3000/chamados/${id}`,{
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": token
            },
            body: JSON.stringify({ status })  
        });

        carregarChamados();
    }

</script>

</body>
</html>
