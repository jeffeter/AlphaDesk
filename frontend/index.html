<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>AlphaDesk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>AlphaDesk</h1>

    <div id="mensagem" style="display:none;"></div>
    <div id="loading" style="display:none;">Carregando...</div>


    <div id="auth">
        <input id="email" placeholder="Email">
        <input id="senha" type="password" placeholder="Senha">

        <button type="button" class="btn-primary" onclick="login()">Login</button>
        <button type="button" class="btn-success" onclick="registrar()">Registrar</button>
    </div>

    <!-- 🖥 APP -->
    <div id="app" style="display:none;">

        <button class="btn-logout" onclick="logout()">Sair</button>

        <hr>

        <input id="titulo" placeholder="Título do chamado">
        <input id="descricao" placeholder="Descrição">

        <button type="button" class="btn-primary" onclick="criarChamado()">Criar Chamado</button>

        <ul id="lista"></ul>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
